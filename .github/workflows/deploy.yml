name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Create ECR repository if not exists
      run: |
        aws ecr describe-repositories \
          --repository-names ${{ secrets.ECR_REPOSITORY }} \
          --region ${{ secrets.AWS_REGION }} \
        || aws ecr create-repository \
          --repository-name ${{ secrets.ECR_REPOSITORY }} \
          --region ${{ secrets.AWS_REGION }}

    - name: Build Docker image
      run: |
        docker build -t myapp .

    - name: Scan vulnerabilities with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: myapp
        format: table
        output: trivy-report.txt
        severity: CRITICAL,HIGH,MEDIUM
        exit-code: 0

    - name: Upload Trivy report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-security-report
        path: trivy-report.txt

    - name: Tag image
      run: |
        docker tag myapp:latest ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

    - name: Push image to ECR
      run: |
        docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

    - name: Deploy to ECS
      run: |
        aws ecs update-service \
        --cluster ${{ secrets.ECS_CLUSTER }} \
        --service ${{ secrets.ECS_SERVICE }} \
        --force-new-deployment