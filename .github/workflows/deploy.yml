name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:

    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: myapp
      TASK_FAMILY: my-task

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Ensure ECR repository exists
      run: |
        aws ecr describe-repositories \
        --repository-names ${{ secrets.ECR_REPOSITORY }} \
        || aws ecr create-repository \
        --repository-name ${{ secrets.ECR_REPOSITORY }}

    - name: Build Docker image
      run: docker build -t $IMAGE_NAME .

    - name: Scan image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE_NAME }}
        format: table
        output: trivy-report.txt
        exit-code: 0

    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: trivy-report
        path: trivy-report.txt

    - name: Tag Docker image
      run: |
        docker tag $IMAGE_NAME:latest \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

    - name: Push image to ECR
      run: |
        docker push \
        ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

    - name: Ensure ECS cluster exists
      run: |
        aws ecs describe-clusters \
        --clusters ${{ secrets.ECS_CLUSTER }} \
        || aws ecs create-cluster \
        --cluster-name ${{ secrets.ECS_CLUSTER }}

    - name: Register task definition
      run: |
        cat > task-definition.json <<EOF
        {
          "family": "${TASK_FAMILY}",
          "executionRoleArn": "arn:aws:iam::173987373607:role/ecsTaskExecutionRole",
          "networkMode": "awsvpc",
          "requiresCompatibilities": ["FARGATE"],
          "cpu": "256",
          "memory": "512",
          "containerDefinitions": [
            {
              "name": "myapp",
              "image": "${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest",
              "essential": true,
              "portMappings": [
                {
                  "containerPort": 8080,
                  "protocol": "tcp"
                }
              ]
            }
          ]
        }
        EOF

        aws ecs register-task-definition \
        --cli-input-json file://task-definition.json

    - name: Create service if not exists
      run: |
        if ! aws ecs describe-services \
          --cluster ${{ secrets.ECS_CLUSTER }} \
          --services ${{ secrets.ECS_SERVICE }} \
          --query "services[0].status" \
          --output text | grep ACTIVE; then

          aws ecs create-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service-name ${{ secrets.ECS_SERVICE }} \
            --task-definition ${TASK_FAMILY} \
            --desired-count 1 \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[subnet-xxxx],assignPublicIp=ENABLED}"
        fi

    - name: Force new deployment
      run: |
        aws ecs update-service \
        --cluster ${{ secrets.ECS_CLUSTER }} \
        --service ${{ secrets.ECS_SERVICE }} \
        --force-new-deployment